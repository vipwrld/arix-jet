<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARIX JET</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0a1f44,#1e3c72);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.08);
    padding:50px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    width:90%;
    max-width:500px;
}

h1{
    font-size:40px;
    letter-spacing:2px;
}

.tag{
    margin-bottom:25px;
    color:#dfe9ff;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#ffffff;
    color:#0a1f44;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.contact{
    margin-top:30px;
    font-size:16px;
    line-height:1.8;
}

.footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>✈️ Welcome to ARIX JET</h1>

<p class="tag">
Luxury • Comfort • Private Aviation Excellence
</p>

<button>Book Flight</button>

<div class="contact">
📞 Contact: +1 (301) 259-1908 <br>
📧 Email: aris.jet.org@gmail.com
</div>

<div class="footer">
© 2026 ARIX JET — All Rights Reserved
</div>

</div>

</body>
</html>
